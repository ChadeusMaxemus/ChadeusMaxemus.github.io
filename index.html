<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climbing Competition</title>
</head>

<body>

<h2>Climbing Competition</h2>
  
<div id="playerStatus" style="
background:#222;
padding:15px;
margin-bottom:20px;
font-size:22px;
">
Player info will appear here after saving.
</div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<br><br>

League:
<select id="league">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

Gender:
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<h3>Boulders</h3>

<div id="boulderContainer"></div>

<button onclick="saveResults()">Save</button>

<script type="module" src="script.js"></script>

</body>
</html>
